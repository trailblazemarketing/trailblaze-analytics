services:
  db:
    image: postgres:16-alpine
    container_name: trailblaze-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trailblaze
      POSTGRES_PASSWORD: trailblaze
      POSTGRES_DB: trailblaze
    ports:
      - "5432:5432"
    volumes:
      - trailblaze_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trailblaze -d trailblaze"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  trailblaze_pgdata:
